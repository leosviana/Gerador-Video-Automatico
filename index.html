<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>gerador-video-automatico</title>
  </head>
  <body>
    <div class="container">
        <h3>Gerador De Vídeo Automático - V5.4</h3>  
        <div class="upload-area">            
            <label>Arquivo MP3:</label><br>
            <input type="file" id="audioInput" accept=".mp3"><br>
            <label>Arquivo MP4:</label><br>
            <input type="file" id="videoInput" accept=".mp4"><br>
            <label>Repetição:</label>
            <select id="loopMode">
                <option value="loop">Loop</option>
                <option value="reverse">Reverso</option>
            </select>
            <label>Tamanho Overlay: </label>
            <input type="range" id="overlayScale" min="0.10" max="1" step="0.05" value="0.55">
            <!-- range: Cria um controle deslizante (slider) para arrastar a bolinha para esquerda ou direita -->
            <!-- min = 0.10 é o menor valor permitido, nesse caso 0.10 = 10% do tamanho original / 1.0 = tamanho original / 2.0 = dobro do tamanho -->
            <!-- max = 4 é o maior valor permitido (4 vezes o tamanho original) -->
            <!-- step = 0.1 define de quanto em quanto o valor pode variar (0.1 significa: 0.5, 0.6, 0.7...) -->
            <!-- value = 0.25 é o valor inicial quando abre a página -->
            <hr>
            <label>Texto:</label>
            <input type="text" id="customText" value="@nome_canal">
            <label>Fonte:</label>
            <select>
                <option value="Arial">Arial</option>
                <option value="Verdana">Verdana</option>
                <option value="Tahoma">Tahoma</option>
                <option value="Impact">Impact</option>
                <option value="Georgia">Georgia</option>
            </select>
            <label>Tamanho:</label>
            <input type="range" id="fontSize" min="20" max="150" step="2" value="60">
            <label>Cor do texto:</label>
            <input type="color" id="textColor" value="#ffffff">
            <label>Cor da borda:</label>
            <input type="color" id="strokeColor" value="#000000">
        </div>
        <div class="preview-wrapper">
            <div class="preview-container">
                <canvas id="previewCanvas"></canvas>
                <video id="overlayVideo" muted autoplay loop playsinline style="display:none;"></video>
            </div>
        </div>
        <div class="video-info">
            <span id="videoResolution">Resolução do vídeo: Nenhum vídeo carregado</span>
        </div>
        <div>
            <label>Resolução de saída:</label>
            <select id="outputResolution">
                <option value="original">Original</option>
                <option value="1280:720">720p</option>
                <option value="1920:1080">1080p</option>
                <option value="2560:1440">1440p</option>
                <option value="3840:2160" disabled>4K</option>
            </select>
        </div>
        <div>
            <button id="btExportar">Exportar Vídeo</button>
            <button id="btCancelar" disabled>Cancelar</button>
        </div>
        <div class="progress-container">
            <div id="progressBar">
                <div id="progressFill"></div>
                <span id="progressText">0%</span>
            </div>

        </div>      
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
